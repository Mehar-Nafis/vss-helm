apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vss.fullname" . }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vss.labels" . | nindent 4 }}
type: Opaque
stringData:
  NGC_API_KEY: {{ .Values.global.ngcApiKey | quote }}
  HF_TOKEN: {{ .Values.global.hfToken | quote }}
{{- if .Values.global.ngcApiKey }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vss.fullname" . }}-ngc-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vss.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {"auths":{"nvcr.io":{"username":"$oauthtoken","password":{{ .Values.global.ngcApiKey | quote }}}}}
{{- end }}

{{- $fullname := include "vss.fullname" . }}
{{- $component := "api-gateway" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vss.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vss.selectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vss.selectorLabels" (dict "root" . "component" $component) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "vss.serviceAccountName" . }}
      {{- include "vss.nodeSelector" . | nindent 6 }}
      {{ include "vss.podSecurityContext" . | nindent 6 }}
      containers:
        - name: api-gateway
          image: {{ .Values.apiGateway.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.apiGateway.port }}
              name: http
          resources:
            {{- toYaml .Values.apiGateway.resources | nindent 12 }}
          securityContext:
            {{ include "vss.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.apiGateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.apiGateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
      volumes:
        - name: nginx-config
          configMap:
            name: {{ $fullname }}-nginx-config
        - name: nginx-cache
          emptyDir: {}

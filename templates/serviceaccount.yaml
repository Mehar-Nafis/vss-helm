{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vss.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vss.labels" . | nindent 4 }}
{{- if .Values.global.ngcApiKey }}
imagePullSecrets:
  - name: {{ include "vss.fullname" . }}-ngc-registry
{{- end }}
{{- end }}

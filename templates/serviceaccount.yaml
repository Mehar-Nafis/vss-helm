{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vss.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vss.labels" . | nindent 4 }}
  {{- if .Values.global.openshift }}
  annotations:
    # OpenShift SCC binding – after install run:
    #   oc adm policy add-scc-to-user privileged \
    #       -z {{ include "vss.serviceAccountName" . }} \
    #       -n {{ .Release.Namespace }}
    openshift.io/sa.scc: privileged
  {{- end }}
{{- end }}

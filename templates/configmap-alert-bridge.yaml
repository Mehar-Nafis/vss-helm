{{- $redisSvc    := printf "%s-redis" .Release.Name }}
{{- $storageSvc  := printf "%s-storage-ms" .Release.Name }}
{{- $viaServerSvc := printf "%s-via-server" .Release.Name }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vss.fullname" . }}-alert-bridge-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vss.labels" . | nindent 4 }}
data:
  config.yaml: |
    # VST Configuration
    vst_config:
      base_url: http://{{ $storageSvc }}:{{ .Values.storageMs.httpPort }}
      storage:
        media_file_path_by_id_endpoint: "/api/v1/storage/file/path"

    # VSS Agent Configuration
    vss_agent:
      base_url: "http://{{ $viaServerSvc }}:{{ .Values.viaServer.backendPort }}"
      VSS_IMAGE_ENDPOINT: "/files"
      VSS_SUMMARIZE_ENDPOINT: "/summarize"
      VSS_CHAT_ENDPOINT: "/chat/completions"
      VSS_REVIEW_ALERT_ENDPOINT: "/reviewAlert"
      request_timeout: 240
      max_retries: 1
      retry_delay: 1.0
      connection_retry_interval: 5
      connection_max_retry_interval: 60
      connection_wait_timeout: 300
      vlm_param_allowlist:
        - prompt
        - system_prompt
        - response_format
        - max_tokens
        - temperature
        - top_p
        - top_k
        - seed

    # Event Bridge Configuration
    event_bridge:
      sourceType: "redisStream"
      sinkType: "redisStream"
      redis_source:
        host: "{{ $redisSvc }}"
        port: 6379
        db: 0
        streams:
          anomaly_stream: "alert-bridge-input-stream"
          heartbeat_stream: "alert-bridge-heartbeats-stream"
        consumer_group: "vlm_agents_group"
        consumer_config:
          block_time: 10
          count: 1
          batch_size: 1
      redis_sink:
        host: "{{ $redisSvc }}"
        port: 6379
        db: 0
        streams:
          enhanced_anomaly_stream: "alert-bridge-enhanced-stream"
          incidents_stream: "alert-bridge-incidents-stream"

    prompt:
      prefer_payload_prompt: true

    alert_agent:
      num_workers: 1
      max_allowed_stream_size: 2
      default_stream_interval: 1

    websocket:
      enabled: true
      consumer_group_prefix: "websocket_instance"
      redis_consumer:
        block_time: 1000
        count: 1
        reconnect_delay: 5

    logging:
      level: "DEBUG"
      format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  alert_request_defaults.yaml: |
    schema:
      version: "2.0.0"
      last_updated: "2025-07-01"
      description: "Default values for Alert Bridge VSS processing"

    vlm_params:
      dummy: true

    vss_params:
      chunk_duration: 60
      chunk_overlap_duration: 10
      cv_metadata_overlay: false
      num_frames_per_chunk: 8
      enable_reasoning: false
      do_verification: false
      debug: false
      vlm_params:
        prompt: null
        system_prompt: null
        response_format:
          type: "text"
        max_tokens: 512
        temperature: 0.2
        top_p: 1.0
        top_k: 100
        seed: 10

    request_defaults:
      confidence: 0.92
      meta_labels: []
      stream_name: null
      cv_metadata_path: null

    validation:
      continue_on_validation_error: true
      max_validation_errors_per_batch: 10
      log_validation_stats: true
      log_applied_defaults: false

    constraints:
      vss_params:
        chunk_duration:
          min: 1
          max: 300
        chunk_overlap_duration:
          min: 0
          max: 60
        num_frames_per_chunk:
          min: 1
          max: 32

    field_validation:
      required_fields:
        - id
        - version
        - "@timestamp"
        - sensor_id
        - video_path
        - alert
        - event
        - vss_params
      required_nested_fields:
        alert:
          - severity
          - status
          - type
          - description
        event:
          - type
          - description
        vss_params:
          - vlm_params

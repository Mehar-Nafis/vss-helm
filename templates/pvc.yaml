{{- $fullname := include "vss.fullname" . }}
{{- $globalSC := .Values.persistence.storageClass }}

# ---------------------------------------------------------------------------
# Shared PVCs — mounted by multiple pods, cannot be volumeClaimTemplates.
# Exclusive PVCs (redis-data, nim-model-cache, vst-data, vst-video) are
# managed by volumeClaimTemplates in their respective StatefulSets.
# ---------------------------------------------------------------------------

# vss-shared-media: shared /tmp across via-server, storage-ms, alert-bridge,
# alert-inspector-ui, nv-cv-event-detector, cv-ui
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}-vss-shared-media
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    {{- include "vss.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.vssSharedMedia.accessMode }}
  resources:
    requests:
      storage: {{ .Values.persistence.vssSharedMedia.size }}
  {{- with (.Values.persistence.vssSharedMedia.storageClass | default $globalSC) }}
  storageClassName: {{ . | quote }}
  {{- end }}
---

          "name": "onvif",
          "type": "vst",
          "need_stream_monitoring": true,
          "need_rtsp_server": true,
          "need_recording": true,
          "need_storage_management": true,
          "control_adaptor_lib_path": "prebuilts/arch/onvif_client.so",
          "discovery_adaptor_lib_path": "prebuilts/arch/onvif_discovery.so"
        },
        {
          "enabled": false,
          "id": "780bd844-5d1c-11ee-8c99-0242ac120002",
          "name": "remote",
          "type": "vst",
          "need_stream_monitoring": true,
          "need_rtsp_server": true,
          "need_recording": true,
          "need_storage_management": true,
          "control_adaptor_lib_path": "prebuilts/arch/libremotedevice.so"
        },
        {
          "enabled": false,
          "id": "640c3667-81e6-460f-b926-b8008a130dba",
          "name": "streamer",
          "type": "streamer",
          "need_rtsp_server": true,
          "need_stream_monitoring": false,
          "need_recording": false,
          "need_storage_management": false,
          "control_adaptor_lib_path": "prebuilts/arch/liblocalstreams.so",

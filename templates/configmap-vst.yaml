    {
      "network": {
        "http_port": "{{ .Values.storageMs.httpPort }}",
        "server_domain_name": "",
        "stunurl_list": ["stun.l.google.com:19302","stun1.l.google.com:19302"],
        "static_turnurl_list": [],
        "use_coturn_auth_secret": false,
        "coturn_turnurl_list_with_secret": [],

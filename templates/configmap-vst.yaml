    {
      "streams": [
        {
          "enabled": false,
          "stream_in": "rtsp://admin:nvidia123@10.24.217.246:554/cam/realmonitor?channel=1&subtype=0&unicast=true&proto=Onvif",
          "name": "Amcrest"
        }
      ],
      "Nvstreamer": [
        {"enabled": true, "endpoint": "localhost:31000", "api": "/api/v1/sensor/streams", "max_stream_count": 100},
        {"enabled": true, "endpoint": "localhost:31001", "api": "/api/v1/sensor/streams", "max_stream_count": 100},
        {"enabled": true, "endpoint": "localhost:31002", "api": "/api/v1/sensor/streams", "max_stream_count": 100},
        {"enabled": true, "endpoint": "localhost:31003", "api": "/api/v1/sensor/streams", "max_stream_count": 100},
        {"enabled": true, "endpoint": "localhost:31004", "api": "/api/v1/sensor/streams", "max_stream_count": 100}
      ]
    }

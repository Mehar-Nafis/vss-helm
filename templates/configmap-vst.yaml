      "security": {
        "use_https": false,
        "use_rtsp_authentication": false,
        "use_http_digest_authentication": false,
        "use_multi_user": false,
        "enable_user_cleanup": false,
        "session_max_age_sec": 2592000,
        "nv_org_id": "",
        "nv_ngc_key": ""
      }

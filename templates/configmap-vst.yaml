        "default_framerate": 30,
        "default_resolution": "1920x1080",
        "default_gov_length": 60,
        "onvif_sensor_time_sync_interval_secs": 60,
        "onvif_sensor_time_sync_compensation_ms": 20
      },
      "data": {
        "storage_config_file": "./configs/vst_storage.json",
        "storage_threshold_percentage": 95,
        "storage_monitoring_frequency_secs": 2,
        "enable_cloud_storage": false,
        "cloud_storage_type": "minio",
        "cloud_storage_endpoint": "http://127.0.0.1:9000",
        "cloud_storage_access_key": "admin",
        "cloud_storage_secret_key": "nvidia123!",
        "cloud_storage_bucket": "videos",
        "cloud_storage_region": "",
        "cloud_storage_use_ssl": false,
        "nv_streamer_directory_path": "/home/vst/vst_release/streamer_videos/",

{{- $fullname := include "vss.fullname" . }}
{{- $component := "nim-llm" }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}-{{ $component }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vss.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  serviceName: {{ $fullname }}-{{ $component }}
  replicas: 1
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "vss.selectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vss.selectorLabels" (dict "root" . "component" $component) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "vss.serviceAccountName" . }}
      {{- include "vss.nodeSelector" . | nindent 6 }}
      {{- include "vss.secondaryAffinity" . | nindent 6 }}
      {{- include "vss.podSecurityContext" . | nindent 6 }}
      containers:
        - name: nim-llm
          securityContext:
            {{- include "vss.containerSecurityContext" . | nindent 12 }}
          image: {{ .Values.nimLlm.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.nimLlm.containerPort }}
              name: http
          env:
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $fullname }}-credentials
                  key: NGC_API_KEY
          resources:
            {{- toYaml .Values.nimLlm.resources | nindent 12 }}
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: nim-model-cache
              mountPath: {{ default "/models" .Values.nimLlm.modelDirectory }}
          livenessProbe:
            exec:
              command:
                - python3
                - -c
                - "import requests; requests.get('http://localhost:{{ .Values.nimLlm.containerPort }}/v1/health/ready')"
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 20
            failureThreshold: 100
          readinessProbe:
            exec:
              command:
                - python3
                - -c
                - "import requests; requests.get('http://localhost:{{ .Values.nimLlm.containerPort }}/v1/health/ready')"
            initialDelaySeconds: 120
            periodSeconds: 10
            timeoutSeconds: 20
            failureThreshold: 100
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.nimLlm.shmSize }}
  volumeClaimTemplates:
    - metadata:
        name: nim-model-cache
        labels:
          {{- include "vss.labels" . | nindent 10 }}
      spec:
        accessModes:
          - {{ .Values.persistence.nimModelCache.accessMode }}
        resources:
          requests:
            storage: {{ .Values.persistence.nimModelCache.size }}
        {{- include "vss.storageClass" (dict "global" .Values.persistence.storageClass "local" .Values.persistence.nimModelCache.storageClass) | nindent 8 }}
